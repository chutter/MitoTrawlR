name: MitoTrawlR
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:

  # ── Read processing ────────────────────────────────────────────────────────
  - fastp=1.3.3
  - bbmap=39.52
  - bwa=0.7.19
  - samtools=1.23.1

  # ── Assembly ───────────────────────────────────────────────────────────────
  - spades>=4.0.0
  - cap3=10.2011
  - cd-hit=4.8.1

  # ── Annotation ────────────────────────────────────────────────────────────
  - blast>=2.17.0
  - trnascan-se=2.0.12

  # ── Alignment & trimming ──────────────────────────────────────────────────
  - mafft=7.526
  - trimal=1.5.1

  # ── Phylogenetics ─────────────────────────────────────────────────────────
  - iqtree>=3.1.1

  # ── Optional tools ────────────────────────────────────────────────────────
  - hisat2=2.2.2
  - gatk4=4.6.2.0
  - orna=2.0

  # ── R core & utilities ────────────────────────────────────────────────────
  - r-essentials=4.5
  - r-devtools=2.5.2
  - r-ape=5.8
  - r-data.table=1.17.8
  - r-stringr=1.5.2
  - r-stringi=1.8.4
  - r-foreach=1.5.2
  - r-doparallel=1.0.17
  - r-seqinr
  - r-biomartr
  - r-rdrop2

  # ── R plotting ────────────────────────────────────────────────────────────
  - r-ggplot2
  - r-scales
  - r-aplot
  - r-gggenomes

  # ── Bioconductor ──────────────────────────────────────────────────────────
  - bioconductor-rsamtools=2.26.0
  - bioconductor-genomicranges=1.62.1
  - bioconductor-biostrings=2.78.0
  - bioconductor-shortread=1.68.0
  - bioconductor-ggtree=4.0.4
